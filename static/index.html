<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WB Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="/static/react.min.js"></script>
  <script src="/static/react-dom.min.js"></script>
  <script src="/static/babel.min.js"></script>
  <style>
    :root{
      --sb:#170f2e; --sb2:#221843; --sb-b:rgba(255,255,255,.08);
      --sb-t:#a89ec8; --sb-ta:#f7f5fc; --sb-act:rgba(139,47,201,.30);
      --bg:#f5f4fb; --white:#fff; --s2:#faf9fe;
      --bd:#ece8f5; --bd2:#d8d0ea;
      --acc:#7c3aed; --acc-l:#f4eefe; --acc-t:#6d28d9;
      --txt:#1b1436; --txt2:#574d72; --txt3:#9a92b4;
      --ok:#059669; --ok-b:#ecfdf5; --ok-e:#a7f3d0;
      --wa:#d97706; --wa-b:#fffbeb; --wa-e:#fde68a;
      --er:#e11d48; --er-b:#fff1f3; --er-e:#fecdd6;
      --in:#7c3aed; --in-b:#f4eefe; --in-e:#ddd0fb;
      --r:13px; --rs:9px; --rl:18px;
      --sw:244px;
      --grad:linear-gradient(135deg,#8b2fc9 0%,#c026a8 55%,#e0218a 100%);
      --grad-soft:linear-gradient(135deg,#faf5ff,#fdf2fb);
      --sh:0 1px 2px rgba(27,20,54,.05),0 1px 3px rgba(27,20,54,.04);
      --shm:0 4px 16px rgba(27,20,54,.09),0 2px 6px rgba(27,20,54,.05);
      --shl:0 14px 40px rgba(27,20,54,.14),0 6px 14px rgba(27,20,54,.08);
      --glow:0 6px 18px rgba(124,58,237,.32);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:'Inter',system-ui,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;background:var(--bg);color:var(--txt)}
    body{background-image:radial-gradient(ellipse 70% 50% at 100% 0%,rgba(192,38,168,.05),transparent 60%),radial-gradient(ellipse 60% 50% at 0% 100%,rgba(124,58,237,.05),transparent 55%);background-attachment:fixed}
    a{color:inherit;text-decoration:none}
    button,input,select{font-family:inherit}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-thumb{background:#d8d0ea;border-radius:6px}
    ::-webkit-scrollbar-thumb:hover{background:#c4b6e0}

    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    @keyframes shimmer{to{background-position:200% 0}}
    .aup{animation:fadeUp .32s cubic-bezier(.22,1,.36,1) both}

    .app{display:flex;min-height:100vh}

    /* ── Sidebar ── */
    .sb{position:fixed;top:0;left:0;bottom:0;width:var(--sw);background:var(--sb);background-image:radial-gradient(ellipse 90% 50% at 0% 0%,rgba(139,47,201,.22),transparent 60%),radial-gradient(ellipse 80% 40% at 100% 100%,rgba(224,33,138,.14),transparent 55%);display:flex;flex-direction:column;z-index:100}
    .sb::before{content:'';position:absolute;top:0;right:0;bottom:0;width:1px;background:var(--sb-b)}
    .sb::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad)}
    .sb-brand{padding:20px 16px 16px;border-bottom:1px solid var(--sb-b);display:flex;align-items:center;gap:11px;flex-shrink:0}
    .sb-logo{width:36px;height:36px;border-radius:10px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;box-shadow:var(--glow)}
    .sb-name{font-size:14px;font-weight:800;color:#f7f5fc;letter-spacing:-.2px}
    .sb-sub{font-size:9px;color:#8b7fb0;margin-top:1px;text-transform:uppercase;letter-spacing:.6px;font-weight:600}
    .sb-nav{flex:1;padding:10px 9px;overflow-y:auto}
    .sb-sec{padding:14px 8px 4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#6c5f93}
    .sb-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:10px;color:var(--sb-t);font-size:13px;font-weight:500;cursor:pointer;transition:all .18s cubic-bezier(.22,1,.36,1);margin-bottom:2px;position:relative}
    .sb-item:hover{background:rgba(255,255,255,.06);color:var(--sb-ta)}
    .sb-item.on{background:var(--sb-act);color:var(--sb-ta);font-weight:600;box-shadow:inset 0 0 0 1px rgba(255,255,255,.06)}
    .sb-item.on::before{content:'';position:absolute;left:-9px;top:50%;transform:translateY(-50%);width:3px;height:18px;border-radius:0 3px 3px 0;background:var(--grad)}
    .sb-ic{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all .18s}
    .sb-item.on .sb-ic{background:var(--grad);box-shadow:var(--glow)}
    .sb-div{height:1px;background:var(--sb-b);margin:6px 0}
    .sb-cab{margin:0 7px 8px;padding:8px 10px;background:rgba(255,255,255,.04);border:1px solid var(--sb-b);border-radius:7px}
    .sb-cab-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#64748b;margin-bottom:3px}
    .sb-cab-n{font-size:11.5px;font-weight:600;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sb-foot{padding:8px 7px 10px;border-top:1px solid var(--sb-b);flex-shrink:0}
    .sb-user{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;cursor:default}
    .sb-ava{width:30px;height:30px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;box-shadow:var(--glow)}
    .sb-uname{font-size:12px;font-weight:600;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sb-urole{font-size:10px;color:#64748b;margin-top:1px}
    .sb-logout{padding:4px;border-radius:5px;background:none;border:none;color:#64748b;cursor:pointer;font-size:13px;line-height:1;transition:all .15s;margin-left:auto;flex-shrink:0}
    .sb-logout:hover{color:#f87171;background:rgba(248,113,113,.1)}

    /* ── Topbar ── */
    .topbar{height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 26px;background:rgba(255,255,255,.78);backdrop-filter:saturate(180%) blur(14px);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:50;box-shadow:var(--sh)}
    .bc{display:flex;align-items:center;gap:6px;font-size:13px}
    .bc-sep{color:var(--txt3)}.bc-dim{color:var(--txt3);font-weight:500}.bc-cur{color:var(--txt);font-weight:700}
    .tr{display:flex;align-items:center;gap:10px}
    .online-pill{display:flex;align-items:center;gap:6px;padding:5px 11px;border-radius:20px;background:var(--ok-b);border:1px solid var(--ok-e);font-size:10.5px;font-weight:700;color:var(--ok)}
    .dot{width:5px;height:5px;border-radius:50%;background:currentColor;display:inline-block}
    .online-pill .dot{animation:pulse 2s ease-in-out infinite}
    .sync-btn{display:flex;align-items:center;gap:6px;padding:7px 13px;background:var(--white);border:1px solid var(--bd2);border-radius:var(--rs);color:var(--txt2);font-size:11.5px;font-weight:600;cursor:pointer;transition:all .18s;font-family:inherit;box-shadow:var(--sh)}
    .sync-btn:hover{border-color:var(--acc);color:var(--acc);box-shadow:0 0 0 3px var(--acc-l);transform:translateY(-1px)}
    .sync-spin{animation:spin .7s linear infinite;display:inline-block}

    /* ── Main ── */
    .main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh}
    .page{padding:26px 28px;flex:1;max-width:1500px;width:100%}
    .ph{margin-bottom:22px}
    .ph-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .pt{font-size:23px;font-weight:800;color:var(--txt);letter-spacing:-.6px;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    .ps{font-size:12.5px;color:var(--txt3);margin-top:4px;font-weight:500}

    /* ── Buttons ── */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:var(--rs);font-size:12.5px;font-weight:600;border:1px solid transparent;transition:all .18s cubic-bezier(.22,1,.36,1);cursor:pointer;font-family:inherit;white-space:nowrap}
    .btn-p{background:var(--grad);color:#fff;border-color:transparent;box-shadow:var(--glow)}
    .btn-p:hover{transform:translateY(-1px);box-shadow:0 9px 22px rgba(124,58,237,.4);filter:brightness(1.05)}
    .btn-g{background:var(--white);color:var(--txt2);border-color:var(--bd2);box-shadow:var(--sh)}
    .btn-g:hover{background:var(--s2);color:var(--acc);border-color:var(--acc)}
    .btn-d{background:var(--er-b);color:var(--er);border-color:var(--er-e)}
    .btn-d:hover{background:#fee2e6;transform:translateY(-1px)}
    .btn-sm{padding:6px 11px;font-size:11.5px}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important;filter:none!important}

    /* ── KPI cards ── */
    .kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(172px,1fr));gap:14px;margin-bottom:22px}
    .kcard{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:17px 19px;position:relative;overflow:hidden;transition:all .25s cubic-bezier(.22,1,.36,1);box-shadow:var(--sh)}
    .kcard::after{content:'';position:absolute;inset:0;background:var(--grad-soft);opacity:0;transition:opacity .25s;pointer-events:none}
    .kcard:hover{box-shadow:var(--shm);transform:translateY(-3px);border-color:var(--bd2)}
    .kcard:hover::after{opacity:.6}
    .k-acc{position:absolute;top:0;left:0;bottom:0;width:4px;border-radius:4px 0 0 4px}
    .k-inner{padding-left:9px;position:relative;z-index:1}
    .k-ic{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:12px;box-shadow:var(--sh)}
    .k-lbl{font-size:11px;font-weight:600;color:var(--txt3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
    .k-val{font-size:24px;font-weight:800;color:var(--txt);line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
    .k-sub{font-size:10.5px;color:var(--txt3);margin-top:4px;font-weight:500}
    .k-ok{color:var(--ok)!important}.k-wa{color:var(--wa)!important}.k-er{color:var(--er)!important}

    /* ── Compact KPI row (Products tab) ── */
    .kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:16px}
    .kpi-card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:15px 17px;box-shadow:var(--sh);position:relative;overflow:hidden;transition:all .25s}
    .kpi-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:4px;border-radius:4px 0 0 4px;background:var(--grad)}
    .kpi-card:hover{transform:translateY(-3px);box-shadow:var(--shm)}
    .kpi-v{font-size:22px;font-weight:800;color:var(--txt);line-height:1;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
    .kpi-l{font-size:11px;font-weight:600;color:var(--txt3);margin-top:6px;text-transform:uppercase;letter-spacing:.4px}

    /* ── Charts ── */
    .chart-card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh);margin-bottom:16px;transition:box-shadow .25s}
    .chart-card:hover{box-shadow:var(--shm)}
    .chart-title{font-size:13.5px;font-weight:700;color:var(--txt);margin-bottom:16px;display:flex;align-items:center;gap:7px}
    .chart-wrap{overflow-x:auto;overflow-y:visible;padding-bottom:4px}
    .chart-empty{text-align:center;padding:40px;color:var(--txt3);font-size:12.5px}
    .bar-val{font-family:'Inter',sans-serif;font-size:8px;fill:#64748b}
    .bar-lbl{font-family:'Inter',sans-serif;font-size:8px;fill:#94a3b8}

    /* ── Horizontal bars ── */
    .hbar-row{margin-bottom:10px}
    .hbar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
    .hbar-lbl{font-size:11.5px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
    .hbar-val{font-size:11.5px;font-weight:600;color:var(--txt);white-space:nowrap;margin-left:8px}
    .hbar-track{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
    .hbar-fill{height:100%;border-radius:3px;transition:width .5s}

    /* ── Stock bar ── */
    .sbar{width:80px;height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle}
    .sfill{height:100%;border-radius:3px}

    /* ── Cab cards ── */
    .cab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}
    .cab-card{background:var(--white);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;cursor:pointer;transition:all .28s cubic-bezier(.22,1,.36,1);box-shadow:var(--sh);position:relative}
    .cab-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad);opacity:0;transition:opacity .28s;z-index:2}
    .cab-card:hover{box-shadow:var(--shl);transform:translateY(-4px);border-color:var(--acc)}
    .cab-card:hover::before{opacity:1}
    .cab-top{padding:18px;background:var(--grad-soft);border-bottom:1px solid var(--bd)}
    .cab-hd{display:flex;align-items:center;justify-content:space-between}
    .cab-ico{width:42px;height:42px;border-radius:11px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:19px;box-shadow:var(--glow)}
    .cab-name{font-size:15px;font-weight:800;color:var(--txt);margin:13px 0 2px;letter-spacing:-.2px}
    .cab-dt{font-size:11px;color:var(--txt3);margin-bottom:11px;font-weight:500}
    .cab-tags{display:flex;gap:5px;flex-wrap:wrap}
    .tag{font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--acc-l);color:var(--acc-t);border:1px solid var(--in-e)}
    .cab-ft{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-top:1px solid var(--bd);background:var(--s2)}
    .cab-ft-t{font-size:11.5px;color:var(--txt2);font-weight:600}
    .cab-arr{color:var(--acc);font-size:17px;transition:transform .25s;font-weight:700}
    .cab-card:hover .cab-arr{transform:translateX(5px)}

    /* ── Tabs ── */
    .tabs{display:flex;background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:5px;gap:3px;box-shadow:var(--sh);flex-wrap:wrap}
    .tab{padding:7px 15px;border-radius:var(--rs);font-size:12.5px;font-weight:600;color:var(--txt3);cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:6px;white-space:nowrap}
    .tab:hover{color:var(--acc);background:var(--acc-l)}
    .tab.on{background:var(--grad);color:#fff;box-shadow:var(--glow)}

    /* ── Table ── */
    .tcard{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
    .ttb{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--bd);flex-wrap:wrap;gap:8px}
    .ttl{font-size:13.5px;font-weight:700;color:var(--txt)}
    .tcnt{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--acc-l);color:var(--acc-t)}
    .tovfl{overflow-x:auto}
    table{width:100%;border-collapse:collapse}
    thead th{background:var(--s2);padding:11px 16px;text-align:left;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--txt3);border-bottom:1px solid var(--bd);white-space:nowrap}
    tbody td{padding:11px 16px;font-size:12.5px;color:var(--txt2);border-bottom:1px solid var(--bd);transition:background .12s}
    tbody tr:last-child td{border-bottom:none}
    tbody tr:hover td{background:var(--acc-l);color:var(--txt)}

    /* ── Badges ── */
    .bdg{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;white-space:nowrap}
    .bdg-g{background:var(--ok-b);color:var(--ok);border:1px solid var(--ok-e)}
    .bdg-r{background:var(--er-b);color:var(--er);border:1px solid var(--er-e)}
    .bdg-y{background:var(--wa-b);color:var(--wa);border:1px solid var(--wa-e)}
    .bdg-b{background:var(--in-b);color:var(--in);border:1px solid var(--in-e)}
    .bdg-x{background:var(--s2);color:#64748b;border:1px solid var(--bd)}

    /* ── Filters ── */
    .fbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .fbar-l{font-size:11.5px;font-weight:600;color:var(--txt3)}
    .din{background:var(--white);border:1px solid var(--bd2);color:var(--txt);padding:6px 9px;border-radius:var(--rs);font-size:11.5px;font-family:inherit;outline:none;transition:border .15s;box-shadow:var(--sh)}
    .din:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-l)}

    /* ── Panel ── */
    .panel{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:18px;box-shadow:var(--sh)}
    .panel-t{font-size:13.5px;font-weight:700;color:var(--txt);margin-bottom:12px}
    .panel-hint{background:var(--in-b);border:1px solid var(--in-e);border-radius:var(--rs);padding:9px 11px;font-size:11.5px;color:#1e40af;margin-bottom:12px;line-height:1.6}

    /* ── Form ── */
    .fg{margin-bottom:12px}
    .fl{display:block;font-size:11.5px;font-weight:600;color:var(--txt2);margin-bottom:4px}
    .fi{width:100%;background:var(--white);border:1px solid var(--bd2);color:var(--txt);padding:8px 11px;border-radius:var(--rs);font-size:12.5px;font-family:inherit;outline:none;transition:all .15s;box-shadow:var(--sh)}
    .fi:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-l)}
    .fi::placeholder{color:var(--txt3)}

    /* ── Modal ── */
    .overlay{position:fixed;inset:0;background:rgba(27,20,54,.45);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .18s ease}
    .modal{background:var(--white);border-radius:var(--rl);padding:24px;width:100%;max-width:460px;box-shadow:var(--shl),0 0 0 1px var(--bd);animation:fadeUp .24s cubic-bezier(.22,1,.36,1)}
    .mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .mt{font-size:15px;font-weight:700;color:var(--txt)}
    .mx{padding:4px;border-radius:4px;background:none;border:none;color:var(--txt3);cursor:pointer;font-size:15px;line-height:1;transition:all .15s}
    .mx:hover{background:var(--er-b);color:var(--er)}
    .mft{display:flex;gap:7px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--bd)}

    /* ── Alert ── */
    .alrt{padding:9px 12px;border-radius:var(--rs);font-size:12.5px;margin-bottom:10px;display:flex;align-items:flex-start;gap:7px;animation:fadeUp .2s ease}
    .alrt-e{background:var(--er-b);color:var(--er);border:1px solid var(--er-e)}
    .alrt-s{background:var(--ok-b);color:var(--ok);border:1px solid var(--ok-e)}
    .alrt-i{background:var(--in-b);color:var(--in);border:1px solid var(--in-e)}

    /* ── Loader ── */
    .spinner{width:16px;height:16px;border:2px solid var(--bd2);border-top-color:var(--acc);border-radius:50%;animation:spin .65s linear infinite;display:inline-block}
    .loader{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--txt3);gap:11px;font-size:12.5px;font-weight:500}
    .empty{text-align:center;padding:56px 20px}
    .empty-ic{font-size:40px;margin-bottom:12px;opacity:.85}
    .empty-t{font-size:14.5px;font-weight:700;color:var(--txt2);margin-bottom:4px}
    .empty-s{font-size:12px;color:var(--txt3)}

    /* ── Login ── */
    .login-wrap{min-height:100vh;display:flex;background:linear-gradient(135deg,#f4eefe,#faf0fb,#fdeef6)}
    .login-l{width:420px;flex-shrink:0;background:var(--sb);display:flex;flex-direction:column;padding:40px;position:relative;overflow:hidden}
    .login-l::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(139,47,201,.3),transparent 60%),radial-gradient(ellipse 70% 50% at 100% 100%,rgba(224,33,138,.22),transparent 55%)}
    .login-l::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad)}
    .login-lc{position:relative;z-index:1;height:100%;display:flex;flex-direction:column}
    .login-brand{display:flex;align-items:center;gap:11px;margin-bottom:auto}
    .login-bic{width:44px;height:44px;border-radius:12px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:21px;box-shadow:var(--glow)}
    .login-bn{font-size:17px;font-weight:800;color:#f7f5fc;letter-spacing:-.2px}
    .login-bs{font-size:10px;color:#8b7fb0;margin-top:1px;font-weight:600}
    .login-tg{margin-bottom:40px}
    .login-tg h2{font-size:26px;font-weight:800;color:#f7f5fc;line-height:1.3;margin-bottom:10px;letter-spacing:-.4px}
    .login-tg p{font-size:12.5px;color:#9387b8;line-height:1.6}
    .login-feats{display:flex;flex-direction:column;gap:11px}
    .login-f{display:flex;align-items:center;gap:10px;font-size:12px;color:#a89ec8}
    .login-fic{width:24px;height:24px;border-radius:7px;background:rgba(139,47,201,.22);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
    .login-r{flex:1;display:flex;align-items:center;justify-content:center;padding:40px}
    .login-card{background:var(--white);border-radius:22px;padding:40px;width:100%;max-width:380px;box-shadow:var(--shl);border:1px solid var(--bd)}
    .login-title{font-size:21px;font-weight:800;color:var(--txt);margin-bottom:4px;letter-spacing:-.4px}
    .login-sub{font-size:12.5px;color:var(--txt3);margin-bottom:24px;font-weight:500}
    .login-btn{width:100%;padding:11px;border:none;font-family:inherit;font-size:14px;font-weight:700;border-radius:var(--rs);cursor:pointer;transition:all .2s;background:var(--grad);color:#fff;box-shadow:var(--glow)}
    .login-btn:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(124,58,237,.4);filter:brightness(1.05)}
    .login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

    /* ── Perm ── */
    .perm-cab{background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);padding:12px;margin-bottom:8px}
    .perm-cn{font-size:12.5px;font-weight:700;color:var(--txt);margin-bottom:8px}
    .perm-cks{display:grid;grid-template-columns:1fr 1fr;gap:7px}
    .perm-ck{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--txt2);cursor:pointer}
    .perm-ck input{width:13px;height:13px;accent-color:var(--acc);cursor:pointer}

    /* Util */
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .num{font-variant-numeric:tabular-nums}
    .bold{font-weight:700}.semi{font-weight:600}.muted{color:var(--txt3)}
    .truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .flex{display:flex}.ic{align-items:center}.jb{justify-content:space-between}.g2{gap:8px}.g3{gap:12px}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;

const api={
  token:()=>localStorage.getItem('token'),
  h:()=>({'Content-Type':'application/json','Authorization':`Bearer ${api.token()}`}),
  async req(m,p,b){
    const r=await fetch(p,{method:m,headers:api.h(),body:b?JSON.stringify(b):undefined});
    if(r.status===204)return null;
    const d=await r.json().catch(()=>({}));
    if(!r.ok)throw new Error(d.detail||`HTTP ${r.status}`);
    return d;
  },
  get:p=>api.req('GET',p),
  post:(p,b)=>api.req('POST',p,b),
  put:(p,b)=>api.req('PUT',p,b),
  patch:(p,b)=>api.req('PATCH',p,b),
  del:p=>api.req('DELETE',p),
};

const fmt={
  n:n=>n==null?'—':Number(n).toLocaleString('ru-RU'),
  r:n=>n==null?'—':Number(n).toLocaleString('ru-RU',{style:'currency',currency:'RUB',maximumFractionDigits:0}),
  d:s=>s?s.slice(0,10):'—',
  pct:(a,b)=>b>0?Math.round(a/b*100)+'%':'—',
};

function useData(fn,deps){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState('');
  useEffect(()=>{
    let alive=true;
    setLoading(true);setError('');
    fn().then(d=>{if(alive){setData(d);setLoading(false);}})
       .catch(e=>{if(alive){setError(e.message);setLoading(false);}});
    return()=>{alive=false;};
  },deps);
  return{data,loading,error};
}

/* ── Charts ── */
function BarChart({data,vkey,lkey,color}){
  if(!data||!data.length)return<div className="chart-empty">Нет данных — нажмите «Обновить данные»</div>;
  const c=color||'#3b82f6';
  const vals=data.map(d=>+(d[vkey])||0);
  const max=Math.max(...vals,1);
  const H=108,slot=Math.max(22,Math.min(48,580/data.length));
  const bw=slot*0.65,W=slot*data.length;
  return(
    <div className="chart-wrap">
      <svg viewBox={`0 0 ${W} ${H+30}`} style={{width:'100%',minWidth:W,height:H+30,display:'block',overflow:'visible'}}>
        {[.25,.5,.75,1].map(f=>(
          <line key={f} x1={0} y1={H*(1-f)} x2={W} y2={H*(1-f)} stroke="#e2e8f0" strokeWidth={.5} strokeDasharray="3,2"/>
        ))}
        {data.map((d,i)=>{
          const h=Math.max(2,vals[i]/max*H);
          const x=i*slot+(slot-bw)/2;
          const cx=i*slot+slot/2;
          return(
            <g key={i}>
              <rect x={x} y={H-h} width={bw} height={h} fill={c} rx={2} opacity={.87}/>
              {h>16&&vals[i]>0&&(
                <text x={cx} y={H-h-3} textAnchor="middle" className="bar-val">
                  {vals[i]>=1000?Math.round(vals[i]/1000)+'k':Math.round(vals[i])}
                </text>
              )}
              <text x={cx} y={H+20} textAnchor="middle" className="bar-lbl">{(d[lkey]||'').slice(5)}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

function LineChart({data,vkey,lkey,color}){
  if(!data||!data.length)return<div className="chart-empty">Нет данных</div>;
  const c=color||'#059669';
  const vals=data.map(d=>+(d[vkey])||0);
  const max=Math.max(...vals,1);
  const H=100,W=580,n=data.length;
  const xp=i=>n>1?i/(n-1)*W:W/2;
  const pts=vals.map((v,i)=>`${xp(i)},${H-v/max*H}`).join(' ');
  const area=`M${vals.map((v,i)=>`${xp(i)},${H-v/max*H}`).join('L')}L${xp(n-1)},${H}L${xp(0)},${H}Z`;
  return(
    <div className="chart-wrap">
      <svg viewBox={`0 0 ${W} ${H+28}`} style={{width:'100%',height:H+28,display:'block'}}>
        <defs><linearGradient id="lg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={c} stopOpacity=".22"/><stop offset="100%" stopColor={c} stopOpacity=".02"/></linearGradient></defs>
        {[.25,.5,.75,1].map(f=><line key={f} x1={0} y1={H*(1-f)} x2={W} y2={H*(1-f)} stroke="#e2e8f0" strokeWidth={.5} strokeDasharray="3,2"/>)}
        <path d={area} fill="url(#lg1)"/>
        <polyline points={pts} fill="none" stroke={c} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"/>
        {vals.map((v,i)=><circle key={i} cx={xp(i)} cy={H-v/max*H} r={2.5} fill={c} stroke="#fff" strokeWidth={1.5}/>)}
        {data.map((d,i)=><text key={i} x={xp(i)} y={H+20} textAnchor="middle" className="bar-lbl">{(d[lkey]||'').slice(5)}</text>)}
      </svg>
    </div>
  );
}

function HBarRow({label,value,max,color,sub}){
  const pct=max>0?Math.max(2,value/max*100):0;
  return(
    <div className="hbar-row">
      <div className="hbar-top">
        <span className="hbar-lbl" title={label}>{label}</span>
        <span className="hbar-val">{fmt.n(value)}{sub&&<span className="muted" style={{fontWeight:400,marginLeft:4}}>{sub}</span>}</span>
      </div>
      <div className="hbar-track"><div className="hbar-fill" style={{width:`${pct}%`,background:color||'#3b82f6'}}/></div>
    </div>
  );
}

/* ── UI ── */
function Loader(){return<div className="loader"><div className="spinner"/>Загрузка...</div>;}
function Err({msg}){return<div className="alrt alrt-e">⚠ {msg}</div>;}
function Alert({type,children}){return<div className={`alrt alrt-${type||'e'}`}>{type==='s'?'✓':type==='i'?'ℹ':'⚠'} {children}</div>;}

function Modal({title,onClose,children,footer}){
  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="mh"><div className="mt">{title}</div><button className="mx" onClick={onClose}>✕</button></div>
        {children}
        {footer&&<div className="mft">{footer}</div>}
      </div>
    </div>
  );
}

function KpiCard({label,value,icon,acc,iconBg,vc,sub,delay}){
  return(
    <div className="kcard aup" style={{animationDelay:`${delay||0}s`}}>
      <div className="k-acc" style={{background:acc||'#3b82f6'}}/>
      <div className="k-inner">
        <div className="k-ic" style={{background:iconBg||'#eff6ff'}}>{icon}</div>
        <div className="k-lbl">{label}</div>
        <div className={`k-val num ${vc||''}`}>{value}</div>
        {sub&&<div className="k-sub">{sub}</div>}
      </div>
    </div>
  );
}

function DataTable({title,count,empty,head,rows}){
  return(
    <div className="tcard">
      <div className="ttb">
        <div className="flex ic g2"><span className="ttl">{title}</span><span className="tcnt">{count}</span></div>
      </div>
      {!rows||rows.length===0
        ?<div className="empty"><div className="empty-ic">📭</div><div className="empty-t">{empty}</div><div className="empty-s">Нажмите «Обновить данные» в правом верхнем углу</div></div>
        :<div className="tovfl"><table><thead><tr>{head.map((h,i)=><th key={i}>{h}</th>)}</tr></thead><tbody>{rows.map((r,i)=><tr key={i}>{r.map((c,j)=><td key={j}>{c}</td>)}</tr>)}</tbody></table></div>
      }
    </div>
  );
}

function StatusBadge({s}){
  if(!s)return<span className="bdg bdg-x">—</span>;
  const l=s.toLowerCase();
  if(l.includes('cancel')||l.includes('отмен'))return<span className="bdg bdg-r"><span className="dot"/>Отмена</span>;
  if(l.includes('return')||l.includes('возврат')||l.includes('defect'))return<span className="bdg bdg-y"><span className="dot"/>Возврат</span>;
  if(l.includes('sell')||l.includes('deliver')||l.includes('complete')||l.includes('sold'))return<span className="bdg bdg-g"><span className="dot"/>Продажа</span>;
  if(l.includes('new')||l.includes('created')||l.includes('waiting'))return<span className="bdg bdg-b"><span className="dot"/>Новый</span>;
  if(l.includes('sort')||l.includes('confirm'))return<span className="bdg bdg-b"><span className="dot"/>В пути</span>;
  return<span className="bdg bdg-x">{s}</span>;
}

function AlertBadge({a}){
  if(a==='red')return<span className="bdg bdg-r"><span className="dot"/>{'<'}7д</span>;
  if(a==='yellow')return<span className="bdg bdg-y"><span className="dot"/>7-14д</span>;
  if(a==='green')return<span className="bdg bdg-g"><span className="dot"/>Норма</span>;
  return<span className="bdg bdg-x">Нет продаж</span>;
}

/* ── Login ── */
function LoginPage({onLogin}){
  const [login,setLogin]=useState('');
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  async function submit(e){
    e.preventDefault();setLoading(true);setErr('');
    try{const d=await api.post('/api/auth/login',{login,password:pw});localStorage.setItem('token',d.token);onLogin(d);}
    catch(e){setErr(e.message);}finally{setLoading(false);}
  }
  return(
    <div className="login-wrap">
      <div className="login-l">
        <div className="login-lc">
          <div className="login-brand">
            <div className="login-bic">🛒</div>
            <div><div className="login-bn">WB Dashboard</div><div className="login-bs">Wildberries Analytics</div></div>
          </div>
          <div className="login-tg">
            <h2>Аналитика всех кабинетов в одном месте</h2>
            <p>Заказы, остатки, реклама и финансы — под контролем в реальном времени.</p>
          </div>
          <div className="login-feats">
            {[['📊','Графики заказов и выручки по дням'],['📦','Умные алерты по остаткам склада'],['🎯','CPO и эффективность рекламных кампаний'],['💰','Финансовый отчёт с разбивкой']].map(([ic,tx])=>(
              <div key={tx} className="login-f"><div className="login-fic">{ic}</div>{tx}</div>
            ))}
          </div>
        </div>
      </div>
      <div className="login-r">
        <div className="login-card aup">
          <div className="login-title">Вход в систему</div>
          <div className="login-sub">WB Dashboard · Мониторинг кабинетов</div>
          {err&&<Alert type="e">{err}</Alert>}
          <form onSubmit={submit}>
            <div className="fg"><label className="fl">Логин</label><input className="fi" value={login} onChange={e=>setLogin(e.target.value)} placeholder="Введите логин" autoFocus required/></div>
            <div className="fg" style={{marginBottom:18}}><label className="fl">Пароль</label><input className="fi" type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" required/></div>
            <button className="login-btn" type="submit" disabled={loading}>
              {loading?<><span className="spinner" style={{borderColor:'rgba(255,255,255,.3)',borderTopColor:'#fff',width:12,height:12}}/> Входим...</>:'Войти →'}
            </button>
          </form>
        </div>
      </div>
    </div>
  );
}

/* ── Sidebar ── */
function Sidebar({page,nav,isAdmin,user,onLogout,cabName}){
  return(
    <aside className="sb">
      <div className="sb-brand">
        <div className="sb-logo">🛒</div>
        <div><div className="sb-name">WB Dashboard</div><div className="sb-sub">Wildberries</div></div>
      </div>
      <nav className="sb-nav">
        <div className="sb-sec">Основное</div>
        <div className={`sb-item${page==='dashboard'||page==='cabinet'?' on':''}`} onClick={()=>nav('dashboard')}>
          <div className="sb-ic">⬡</div>Обзор
        </div>
        {isAdmin&&<>
          <div className="sb-div"/>
          <div className="sb-sec">Управление</div>
          <div className={`sb-item${page==='cabs'?' on':''}`} onClick={()=>nav('cabs')}>
            <div className="sb-ic">🗄</div>Кабинеты WB
          </div>
          <div className={`sb-item${page==='users'?' on':''}`} onClick={()=>nav('users')}>
            <div className="sb-ic">👥</div>Пользователи
          </div>
        </>}
        {cabName&&<><div className="sb-div"/><div className="sb-cab"><div className="sb-cab-l">Открыт кабинет</div><div className="sb-cab-n">{cabName}</div></div></>}
      </nav>
      <div className="sb-foot">
        <div className="sb-user">
          <div className="sb-ava">{(user?.login||'?')[0].toUpperCase()}</div>
          <div style={{flex:1,minWidth:0}}>
            <div className="sb-uname">{user?.login}</div>
            <div className="sb-urole">{isAdmin?'Администратор':'Просмотр'}</div>
          </div>
          <button className="sb-logout" onClick={onLogout} title="Выйти">⏻</button>
        </div>
      </div>
    </aside>
  );
}

/* ── Topbar ── */
function Topbar({crumbs,isAdmin}){
  const [syncing,setSyncing]=useState(false);
  const [lastSync,setLastSync]=useState('');
  async function sync(){
    setSyncing(true);
    try{await api.post('/api/admin/sync');}catch(e){}
    setLastSync(new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}));
    setTimeout(()=>setSyncing(false),2000);
  }
  return(
    <div className="topbar">
      <div className="bc">
        {crumbs.map((c,i)=><React.Fragment key={i}>{i>0&&<span className="bc-sep">›</span>}<span className={i===crumbs.length-1?'bc-cur':'bc-dim'}>{c}</span></React.Fragment>)}
      </div>
      <div className="tr">
        <div className="online-pill"><span className="dot"/>Онлайн</div>
        {isAdmin&&<button className="sync-btn" onClick={sync} disabled={syncing}>
          <span className={syncing?'sync-spin':''}>↻</span>
          {syncing?'Синхронизация...':lastSync?`Обновлено ${lastSync}`:'Обновить данные'}
        </button>}
      </div>
    </div>
  );
}

/* ── Dashboard ── */
function Dashboard({onOpen}){
  const {data,loading,error}=useData(()=>api.get('/api/cabinets'),[]);
  if(loading)return<Loader/>;
  if(error)return<Err msg={error}/>;
  return(
    <div>
      <div className="ph"><div className="pt">Обзор кабинетов</div><div className="ps">{data?.length||0} кабинет(ов) · синхронизация каждые 10 мин</div></div>
      {!data?.length
        ?<div className="empty"><div className="empty-ic">🗄</div><div className="empty-t">Кабинеты не добавлены</div><div className="empty-s">Перейдите в «Кабинеты WB» для добавления</div></div>
        :<div className="cab-grid">
          {data.map((c,i)=>(
            <div key={c.id} className="cab-card aup" style={{animationDelay:`${i*.07}s`}} onClick={()=>onOpen(c)}>
              <div className="cab-top">
                <div className="cab-hd"><div className="cab-ico">🏪</div><span className="bdg bdg-g"><span className="dot"/>Активен</span></div>
                <div className="cab-name">{c.name}</div>
                <div className="cab-dt">Добавлен {fmt.d(c.created_at)}</div>
                <div className="cab-tags">
                  {c.permissions?.orders&&<span className="tag">📦 Заказы</span>}
                  {c.permissions?.stock&&<span className="tag">🏭 Остатки</span>}
                  {c.permissions?.ads&&<span className="tag">📣 Реклама</span>}
                  {c.permissions?.finances&&<span className="tag">💰 Финансы</span>}
                </div>
              </div>
              <div className="cab-ft"><span className="cab-ft-t">Открыть аналитику</span><span className="cab-arr">›</span></div>
            </div>
          ))}
        </div>
      }
    </div>
  );
}

/* ── Analytics Tab ── */
function AnalyticsTab({id,df,dt}){
  const {data,loading,error}=useData(()=>api.get(`/api/cabinets/${id}/analytics?date_from=${df}&date_to=${dt}`),[id,df,dt]);
  if(loading)return<Loader/>;
  if(error)return<Err msg={error}/>;
  const obd=data?.orders_by_day||[];
  const top=data?.top_articles||[];
  const regs=data?.regions||[];
  const sts=data?.statuses||[];
  const totalOrders=obd.reduce((s,r)=>s+(r.cnt||0),0);
  const totalRev=obd.reduce((s,r)=>s+(r.revenue||0),0);
  const avgOrder=totalOrders>0?totalRev/totalOrders:0;
  const cancelled=sts.find(s=>(s.status||'').toLowerCase().includes('cancel'))?.cnt||0;
  const cancelRate=totalOrders>0?Math.round(cancelled/totalOrders*100):0;
  const topArtMax=top[0]?.cnt||1;
  const topRegMax=regs[0]?.cnt||1;
  return(
    <div className="aup">
      <div className="kgrid">
        <KpiCard label="Заказов за период" value={fmt.n(totalOrders)} icon="📦" acc="linear-gradient(#3b82f6,#8b5cf6)" iconBg="#eff6ff" delay={0}/>
        <KpiCard label="Выручка" value={fmt.r(totalRev)} icon="₽" acc="linear-gradient(#10b981,#059669)" iconBg="#ecfdf5" vc="k-ok" delay={.05}/>
        <KpiCard label="Средний чек" value={fmt.r(avgOrder)} icon="📊" acc="linear-gradient(#f59e0b,#d97706)" iconBg="#fffbeb" delay={.1}/>
        <KpiCard label="% отмен" value={cancelRate+'%'} icon="↩" acc="linear-gradient(#ef4444,#dc2626)" iconBg="#fef2f2" vc={cancelRate>15?'k-er':cancelRate>8?'k-wa':''} delay={.15} sub={`${cancelled} из ${totalOrders}`}/>
      </div>
      <div className="two-col" style={{marginBottom:14}}>
        <div className="chart-card">
          <div className="chart-title">📦 Заказы по дням</div>
          <BarChart data={obd} vkey="cnt" lkey="date" color="#3b82f6"/>
        </div>
        <div className="chart-card">
          <div className="chart-title">💰 Выручка по дням</div>
          <LineChart data={obd} vkey="revenue" lkey="date" color="#059669"/>
        </div>
      </div>
      <div className="two-col">
        <div className="chart-card">
          <div className="chart-title">🏆 Топ артикулов</div>
          {top.length===0
            ?<div className="chart-empty">Нет данных</div>
            :top.map((a,i)=><HBarRow key={i} label={a.article||'—'} value={a.cnt} max={topArtMax} color="#3b82f6" sub={fmt.r(a.revenue)}/>)
          }
        </div>
        <div className="chart-card">
          <div className="chart-title">🌍 Регионы</div>
          {regs.length===0

/* ── Products Tab ── */
function ProductsTab({id,df,dt}){
  const {data,loading,error}=useData(()=>api.get(`/api/cabinets/${id}/products-report?date_from=${df}&date_to=${dt}`),[id,df,dt]);
  const [search,setSearch]=useState('');
  if(loading)return<Loader/>;
  if(error)return<Err msg={error}/>;
  const dates=(data?.dates)||[];
  const items=(data?.items)||[];
  const filtered=search?items.filter(r=>(r.article||'').toLowerCase().includes(search.toLowerCase())||(r.subject||'').toLowerCase().includes(search.toLowerCase())):items;

  // KPI
  const totalSKU=new Set(items.map(r=>r.article)).size;
  const totalSales=items.reduce((s,r)=>s+r.total_sales,0);
  const totalRev=items.reduce((s,r)=>s+r.total_revenue,0);
  const totalStock=items.reduce((s,r)=>s+r.stock,0);

  // Color for daily cell
  function cellColor(n){
    if(!n)return{background:'#f8fafc',color:'#94a3b8'};
    if(n<=2)return{background:'#fef9c3',color:'#92400e'};
    return{background:'#dcfce7',color:'#166534'};
  }
  function stockCol(qty){
    if(qty===0)return'#dc2626';
    if(qty<10)return'#d97706';
    return'#059669';
  }

  // Totals per date
  const dateTotals={};
  dates.forEach(d=>{dateTotals[d]=filtered.reduce((s,r)=>s+(r.sales_by_date[d]||0),0);});

  return(
    <div>
      <div className="kpi-row">
        <div className="kpi-card"><div className="kpi-v">{totalSKU}</div><div className="kpi-l">SKU артикулов</div></div>
        <div className="kpi-card"><div className="kpi-v">{totalSales}</div><div className="kpi-l">Всего продаж</div></div>
        <div className="kpi-card"><div className="kpi-v">{totalRev.toLocaleString('ru')} ₽</div><div className="kpi-l">Выручка</div></div>
        <div className="kpi-card"><div className="kpi-v">{totalStock}</div><div className="kpi-l">Остатки сейчас</div></div>
      </div>
      <div style={{marginBottom:12}}>
        <input className="din" placeholder="Поиск по артикулу или предмету..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:280}}/>
      </div>
      {!filtered.length?<div className="chart-empty">Нет данных — нажмите «Обновить данные»</div>:(
        <div style={{overflowX:'auto'}}>
          <table style={{borderCollapse:'collapse',fontSize:12,whiteSpace:'nowrap',width:'100%'}}>
            <thead>
              <tr style={{background:'#f1f5f9',position:'sticky',top:0}}>
                <th style={th}>Предмет</th>
                <th style={th}>Артикул</th>
                <th style={th}>nmId</th>
                <th style={th}>Размер</th>
                <th style={th}>Баркод</th>
                {dates.map(d=><th key={d} style={{...th,minWidth:52,background:'#e0f2fe',color:'#0369a1'}}>{d.slice(5)}</th>)}
                <th style={{...th,background:'#f0fdf4',color:'#166534'}}>Итого</th>
                <th style={{...th,background:'#fdf4ff',color:'#7c3aed'}}>РК ₽</th>
                <th style={{...th,background:'#fff7ed',color:'#c2410c'}}>Скидка</th>
                <th style={{...th,background:'#f0f9ff',color:'#0369a1'}}>Остаток</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map((r,i)=>(
                <tr key={i} style={{borderBottom:'1px solid #e2e8f0'}}>
                  <td style={td}>{r.subject||'—'}</td>
                  <td style={{...td,fontWeight:600,maxWidth:160,overflow:'hidden',textOverflow:'ellipsis'}}>{r.article}</td>
                  <td style={{...td,color:'#64748b'}}>{r.nm_id}</td>
                  <td style={{...td,textAlign:'center'}}>{r.size||'—'}</td>
                  <td style={{...td,color:'#94a3b8',fontSize:11}}>{r.barcode||'—'}</td>
                  {dates.map(d=>{
                    const n=r.sales_by_date[d]||0;
                    return<td key={d} style={{...td,textAlign:'center',...cellColor(n)}}>{n||''}</td>;
                  })}
                  <td style={{...td,textAlign:'center',fontWeight:700,background:'#f0fdf4',color:'#166534'}}>{r.total_sales}</td>
                  <td style={{...td,textAlign:'center',color:'#7c3aed'}}>{r.rk_spend>0?r.rk_spend.toFixed(0):'—'}</td>
                  <td style={{...td,textAlign:'center'}}>{r.avg_discount>0?r.avg_discount+'%':'—'}</td>
                  <td style={{...td,textAlign:'center',fontWeight:700,color:stockCol(r.stock)}}>{r.stock}</td>
                </tr>
              ))}
            </tbody>
            <tfoot>
              <tr style={{background:'#f8fafc',fontWeight:700,borderTop:'2px solid #cbd5e1'}}>
                <td style={td} colSpan={5}>ИТОГО</td>
                {dates.map(d=><td key={d} style={{...td,textAlign:'center',background:'#e0f2fe'}}>{dateTotals[d]||''}</td>)}
                <td style={{...td,textAlign:'center',background:'#f0fdf4',color:'#166534'}}>{filtered.reduce((s,r)=>s+r.total_sales,0)}</td>
                <td style={{...td,textAlign:'center',color:'#7c3aed'}}>{(data?.total_rk||0).toFixed(0)}</td>
                <td style={td}>—</td>
                <td style={{...td,textAlign:'center'}}>{filtered.reduce((s,r)=>s+r.stock,0)}</td>
              </tr>
            </tfoot>
          </table>
        </div>
      )}
    </div>
  );
}
const th={padding:'6px 10px',textAlign:'left',fontWeight:600,fontSize:11,border:'1px solid #e2e8f0',whiteSpace:'nowrap'};
const td={padding:'5px 8px',border:'1px solid #f1f5f9'};

/* ── Ads Tab ── */
function AdsTab({id,df,dt}){
  const {data,loading,error}=useData(()=>api.get(`/api/cabinets/${id}/ads?date_from=${df}&date_to=${dt}`),[id,df,dt]);
  if(loading)return<Loader/>;
  if(error)return<Err msg={error}/>;
  const all=data||[];
  const spend=all.reduce((s,r)=>s+(r.spend||0),0);
  const orders=all.reduce((s,r)=>s+(r.orders||0),0);
  const views=all.reduce((s,r)=>s+(r.views||0),0);
  const clicks=all.reduce((s,r)=>s+(r.clicks||0),0);
  const cpo=orders>0?spend/orders:0;
  const ctr=views>0?clicks/views*100:0;
  const byCamp={};
  all.forEach(r=>{
    const k=r.campaign_id||'?';
    if(!byCamp[k])byCamp[k]={id:k,name:r.campaign_name,spend:0,views:0,clicks:0,orders:0};
    byCamp[k].spend+=r.spend||0;byCamp[k].views+=r.views||0;byCamp[k].clicks+=r.clicks||0;byCamp[k].orders+=r.orders||0;
  });
  const camps=Object.values(byCamp).sort((a,b)=>b.spend-a.spend);
  const spendByDay={};
  all.forEach(r=>{if(r.date){if(!spendByDay[r.date])spendByDay[r.date]={date:r.date,spend:0};spendByDay[r.date].spend+=r.spend||0;}});
  const sbd=Object.values(spendByDay).sort((a,b)=>a.date.localeCompare(b.date));
  return(
    <div className="aup">
      <div className="kgrid">
        <KpiCard label="Расход" value={fmt.r(spend)} icon="💸" acc="linear-gradient(#ef4444,#dc2626)" iconBg="#fef2f2" vc="k-er" delay={0}/>
        <KpiCard label="Заказы с рекламы" value={fmt.n(orders)} icon="🛒" acc="linear-gradient(#3b82f6,#8b5cf6)" iconBg="#eff6ff" delay={.05}/>
        <KpiCard label="CPO" value={fmt.r(cpo)} icon="🎯" acc="linear-gradient(#f59e0b,#d97706)" iconBg="#fffbeb" delay={.1} sub={orders>0?undefined:'заказов нет'}/>
        <KpiCard label="Показы / CTR" value={fmt.n(views)} icon="👁" acc="linear-gradient(#10b981,#059669)" iconBg="#ecfdf5" delay={.15} sub={`CTR ${ctr.toFixed(2)}%`}/>
      </div>
      {sbd.length>0&&<div className="chart-card" style={{marginBottom:14}}><div className="chart-title">💸 Расход по дням (₽)</div><BarChart data={sbd} vkey="spend" lkey="date" color="#ef4444"/></div>}
      <DataTable title="Кампании" count={`${camps.length}`} empty="Нет данных по рекламе"
        head={['Кампания','Расход','Показы','Клики','CTR','Заказы','CPO']}
        rows={camps.map(c=>{
          const ct=c.views>0?(c.clicks/c.views*100).toFixed(2)+'%':'—';
          return[
            <span className="truncate bold" style={{maxWidth:160,display:'block'}}>{c.name||`#${c.id}`}</span>,
            <span className="num semi k-er">{fmt.r(c.spend)}</span>,
            <span className="num">{fmt.n(c.views)}</span>,
            <span className="num">{fmt.n(c.clicks)}</span>,
            <span>{ct}</span>,
            <span className="num">{fmt.n(c.orders)}</span>,
            <span className="num">{c.orders>0?fmt.r(c.spend/c.orders):'—'}</span>,
          ];
        })}/>
    </div>
  );
}

/* ── Finances Tab ── */
function FinancesTab({id,df,dt}){
  const {data,loading,error}=useData(()=>api.get(`/api/cabinets/${id}/finances?date_from=${df}&date_to=${dt}`),[id,df,dt]);
  if(loading)return<Loader/>;
  if(error)return<Err msg={error}/>;
  const all=Array.isArray(data)?data:[];
  const s=k=>all.reduce((a,r)=>a+(r[k]||0),0);
  const rev=s('revenue'),pay=s('to_pay'),com=s('commission'),log=s('logistics'),pen=s('penalty'),stor=s('storage'),ret=s('returns'),oth=s('other_deductions');
  const margin=rev>0?Math.round(pay/rev*100):0;
  const revByDay=[...all].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  return(
    <div className="aup">
      <div className="kgrid">
        <KpiCard label="Выручка" value={fmt.r(rev)} icon="📈" acc="linear-gradient(#3b82f6,#8b5cf6)" iconBg="#eff6ff" delay={0}/>
        <KpiCard label="К выплате" value={fmt.r(pay)} icon="💰" acc="linear-gradient(#10b981,#059669)" iconBg="#ecfdf5" vc="k-ok" delay={.05} sub={`Маржа ${margin}%`}/>
        <KpiCard label="Комиссия WB" value={fmt.r(com)} icon="📋" acc="linear-gradient(#f59e0b,#d97706)" iconBg="#fffbeb" delay={.1}/>
        <KpiCard label="Логистика" value={fmt.r(log)} icon="🚚" acc="linear-gradient(#f59e0b,#d97706)" iconBg="#fffbeb" delay={.15}/>
        <KpiCard label="Штрафы" value={fmt.r(pen)} icon="⚠" acc="linear-gradient(#ef4444,#dc2626)" iconBg="#fef2f2" vc={pen>0?'k-er':''} delay={.2}/>
      </div>
      {revByDay.length>0&&(
        <div className="two-col" style={{marginBottom:14}}>
          <div className="chart-card"><div className="chart-title">📈 Выручка по дням</div><BarChart data={revByDay} vkey="revenue" lkey="date" color="#3b82f6"/></div>
          <div className="chart-card"><div className="chart-title">💰 К выплате по дням</div><BarChart data={revByDay} vkey="to_pay" lkey="date" color="#059669"/></div>
        </div>
      )}
      {rev>0&&(
        <div className="chart-card" style={{marginBottom:14}}>
          <div className="chart-title">📊 Структура выручки</div>
          {[{l:'К выплате',v:pay,c:'#059669'},{l:'Комиссия WB',v:com,c:'#f59e0b'},{l:'Логистика',v:log,c:'#3b82f6'},{l:'Хранение',v:stor,c:'#8b5cf6'},{l:'Возвраты',v:ret,c:'#f97316'},{l:'Прочие вычеты',v:oth,c:'#94a3b8'},{l:'Штрафы',v:pen,c:'#ef4444'}].filter(x=>x.v>0).map((it,i)=>(
            <HBarRow key={i} label={it.l} value={it.v} max={rev} color={it.c} sub={fmt.pct(it.v,rev)}/>
          ))}
        </div>
      )}
      <DataTable title="Финансовые отчёты WB" count={`${all.length} периодов`} empty="Нет финансовых данных — нажмите «Обновить данные»"
        head={['Период','Выручка','К выплате','Маржа','Комиссия WB','Логистика','Хранение','Возвраты','Штрафы']}
        rows={all.map(r=>{
          const margin=r.revenue>0?Math.round(r.to_pay/r.revenue*100):0;
          const period=r.date_to&&r.date_to!==r.date?`${fmt.d(r.date)} — ${fmt.d(r.date_to)}`:fmt.d(r.date);
          return[
            <span className="muted" style={{fontSize:11}}>{period}</span>,
            <span className="num">{fmt.r(r.revenue)}</span>,
            <span className="num semi k-ok">{fmt.r(r.to_pay)}</span>,
            <span className={`num semi ${margin<50?'k-wa':'k-ok'}`}>{margin}%</span>,
            <span className="num">{fmt.r(r.commission)}</span>,
            <span className="num">{fmt.r(r.logistics)}</span>,
            <span className="num">{fmt.r(r.storage||0)}</span>,
            <span className="num">{fmt.r(r.returns||0)}</span>,
            <span className="num" style={{color:r.penalty>0?'var(--er)':'inherit'}}>{fmt.r(r.penalty)}</span>,
          ];
        })}/>
    </div>
  );
}

/* ── Cabinet Detail ── */
function CabinetDetail({cabinet,onBack}){
  const perms=cabinet.permissions||{};
  const today=new Date().toISOString().slice(0,10);
  const monthAgo=new Date(Date.now()-30*864e5).toISOString().slice(0,10);
  const [df,setDf]=useState(monthAgo);
  const [dt,setDt]=useState(today);
  const tabs=[
    perms.orders&&{id:'analytics',icon:'📊',label:'Аналитика'},
    perms.orders&&{id:'orders',icon:'📦',label:'Заказы'},
    perms.orders&&{id:'products',icon:'🏷',label:'Товары'},
    perms.stock&&{id:'stock',icon:'🏭',label:'Остатки'},
    perms.ads&&{id:'ads',icon:'📣',label:'Реклама'},
    perms.finances&&{id:'finances',icon:'💰',label:'Финансы'},
  ].filter(Boolean);
  const [tab,setTab]=useState(tabs[0]?.id||'');
  return(
    <div>
      <div className="ph">
        <div className="ph-row">
          <div className="flex ic g2">
            <button className="btn btn-g btn-sm" onClick={onBack}>← Назад</button>
            <div><div className="pt">{cabinet.name}</div><div className="ps">Детальная аналитика кабинета</div></div>
          </div>
        </div>
      </div>
      <div className="flex ic g2" style={{marginBottom:16,flexWrap:'wrap'}}>
        <div className="tabs">{tabs.map(t=><div key={t.id} className={`tab${tab===t.id?' on':''}`} onClick={()=>setTab(t.id)}><span>{t.icon}</span>{t.label}</div>)}</div>
        {tab!=='stock'&&(
          <div className="fbar">
            <span className="fbar-l">Период:</span>
            <input type="date" className="din" value={df} onChange={e=>setDf(e.target.value)}/>
            <span className="muted">—</span>
            <input type="date" className="din" value={dt} onChange={e=>setDt(e.target.value)}/>
          </div>
        )}
      </div>
      {tab==='analytics'&&<AnalyticsTab id={cabinet.id} df={df} dt={dt}/>}
      {tab==='orders'&&<OrdersTab id={cabinet.id} df={df} dt={dt}/>}
      {tab==='products'&&<ProductsTab id={cabinet.id} df={df} dt={dt}/>}
      {tab==='stock'&&<StockTab id={cabinet.id}/>}
      {tab==='ads'&&<AdsTab id={cabinet.id} df={df} dt={dt}/>}
      {tab==='finances'&&<FinancesTab id={cabinet.id} df={df} dt={dt}/>}
    </div>
  );
}

/* ── Admin Cabinets ── */
function AdminCabinets(){
  const [cabs,setCabs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showAdd,setShowAdd]=useState(false);
  const [name,setName]=useState('');
  const [token,setToken]=useState('');
  const [err,setErr]=useState('');
  const [saving,setSaving]=useState(false);

  useEffect(()=>{
    api.get('/api/admin/cabinets').then(setCabs).finally(()=>setLoading(false));
  },[]);

  async function add(e){
    e.preventDefault();setErr('');setSaving(true);
    try{const c=await api.post('/api/admin/cabinets',{name,api_token:token});setCabs(p=>[...p,c]);setName('');setToken('');setShowAdd(false);}
    catch(e){setErr(e.message);}finally{setSaving(false);}
  }
  async function del(id){
    if(!confirm('Удалить кабинет и все данные?'))return;
    await api.del(`/api/admin/cabinets/${id}`);setCabs(p=>p.filter(c=>c.id!==id));
  }
  if(loading)return<Loader/>;
  return(
    <div>
      <div className="ph"><div className="ph-row">
        <div><div className="pt">Кабинеты WB</div><div className="ps">Управление кабинетами и API токенами</div></div>
        <button className="btn btn-p" onClick={()=>setShowAdd(true)}>+ Добавить кабинет</button>
      </div></div>
      {showAdd&&(
        <div className="panel aup" style={{maxWidth:480,marginBottom:18}}>
          <div className="panel-t">🗄 Новый кабинет</div>
          <div className="panel-hint">Токен проверяется при добавлении. Нужны права на чтение заказов, остатков, рекламы и финансов в личном кабинете WB.</div>
          {err&&<Alert type="e">{err}</Alert>}
          <form onSubmit={add}>
            <div className="fg"><label className="fl">Название кабинета</label><input className="fi" value={name} onChange={e=>setName(e.target.value)} placeholder="Мой магазин" required/></div>
            <div className="fg"><label className="fl">API токен WB</label><input className="fi" value={token} onChange={e=>setToken(e.target.value)} placeholder="eyJhbGci..." required/></div>
            <div className="flex g2">
              <button className="btn btn-p" type="submit" disabled={saving}>{saving?'Проверка токена...':'Добавить'}</button>
              <button className="btn btn-g" type="button" onClick={()=>{setShowAdd(false);setErr('');}}>Отмена</button>
            </div>
          </form>
        </div>
      )}
      {cabs.length===0
        ?<div className="empty"><div className="empty-ic">🗄</div><div className="empty-t">Кабинеты не добавлены</div></div>
        :<DataTable title="Кабинеты" count={cabs.length} empty="" head={['#','Название','Добавлен','']}
            rows={cabs.map(c=>[
              <span className="muted">{c.id}</span>,
              <span className="bold">{c.name}</span>,
              <span className="muted">{fmt.d(c.created_at)}</span>,
              <button className="btn btn-d btn-sm" onClick={()=>del(c.id)}>Удалить</button>,
            ])}/>
      }
    </div>
  );
}

/* ── Admin Users ── */
function AdminUsers(){
  const [users,setUsers]=useState([]);
  const [cabs,setCabs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showCreate,setShowCreate]=useState(false);
  const [permUser,setPermUser]=useState(null);
  const [login,setLogin]=useState('');
  const [pw,setPw]=useState('');
  const [isAdmin,setIsAdmin]=useState(false);
  const [err,setErr]=useState('');
  const [saving,setSaving]=useState(false);

  useEffect(()=>{
    Promise.all([api.get('/api/admin/users'),api.get('/api/admin/cabinets')])
      .then(([u,c])=>{setUsers(u);setCabs(c);})
      .finally(()=>setLoading(false));
  },[]);

  async function create(e){
    e.preventDefault();setErr('');setSaving(true);
    try{const u=await api.post('/api/admin/users',{login,password:pw,is_admin:isAdmin});setUsers(p=>[...p,u]);setLogin('');setPw('');setIsAdmin(false);setShowCreate(false);}
    catch(e){setErr(e.message);}finally{setSaving(false);}
  }
  async function toggle(id){const u=await api.patch(`/api/admin/users/${id}/active`);setUsers(p=>p.map(x=>x.id===id?{...x,...u}:x));}
  async function del(id){if(!confirm('Удалить?'))return;await api.del(`/api/admin/users/${id}`);setUsers(p=>p.filter(u=>u.id!==id));}

  if(loading)return<Loader/>;
  return(
    <div>
      <div className="ph"><div className="ph-row">
        <div><div className="pt">Пользователи</div><div className="ps">Управление доступами к кабинетам</div></div>
        <button className="btn btn-p" onClick={()=>setShowCreate(true)}>+ Добавить пользователя</button>
      </div></div>
      {showCreate&&(
        <Modal title="Новый пользователь" onClose={()=>{setShowCreate(false);setErr('');}}>
          {err&&<Alert type="e">{err}</Alert>}
          <form onSubmit={create}>
            <div className="fg"><label className="fl">Логин</label><input className="fi" value={login} onChange={e=>setLogin(e.target.value)} placeholder="user123" required/></div>
            <div className="fg"><label className="fl">Пароль (мин. 8 символов)</label><input className="fi" type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" required/></div>
            <label style={{display:'flex',alignItems:'center',gap:8,fontSize:12.5,color:'var(--txt2)',cursor:'pointer'}}>
              <input type="checkbox" style={{accentColor:'var(--acc)'}} checked={isAdmin} onChange={e=>setIsAdmin(e.target.checked)}/> Администратор
            </label>
            <div className="mft">
              <button className="btn btn-g" type="button" onClick={()=>setShowCreate(false)}>Отмена</button>
              <button className="btn btn-p" type="submit" disabled={saving}>{saving?'Создание...':'Создать'}</button>
            </div>
          </form>
        </Modal>
      )}
      {permUser&&<PermModal user={permUser} cabinets={cabs} onClose={()=>setPermUser(null)}/>}
      <DataTable title="Пользователи" count={users.length} empty="Нет пользователей"
        head={['#','Логин','Роль','Статус','Создан','Действия']}
        rows={users.map(u=>[
          <span className="muted">{u.id}</span>,
          <span className="bold">{u.login}</span>,
          u.is_admin?<span className="bdg bdg-b">Админ</span>:<span className="bdg bdg-x">Просмотр</span>,
          u.is_active?<span className="bdg bdg-g"><span className="dot"/>Активен</span>:<span className="bdg bdg-r"><span className="dot"/>Откл.</span>,
          <span className="muted">{fmt.d(u.created_at)}</span>,
          <div className="flex g2">
            <button className="btn btn-g btn-sm" onClick={()=>setPermUser(u)}>Доступы</button>
            <button className="btn btn-g btn-sm" onClick={()=>toggle(u.id)}>{u.is_active?'Откл.':'Вкл.'}</button>
            <button className="btn btn-d btn-sm" onClick={()=>del(u.id)}>✕</button>
          </div>,
        ])}/>
    </div>
  );
}

function PermModal({user,cabinets,onClose}){
  const [perms,setPerms]=useState({});
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState('');
  useEffect(()=>{
    api.get(`/api/admin/users/${user.id}/permissions`)
      .then(data=>{const m={};data.forEach(p=>{m[p.cabinet_id]={orders:!!p.can_view_orders,stock:!!p.can_view_stock,ads:!!p.can_view_ads,finances:!!p.can_view_finances};});setPerms(m);})
      .finally(()=>setLoading(false));
  },[]);
  function tog(cid,f){setPerms(p=>({...p,[cid]:{...(p[cid]||{}),[f]:!p[cid]?.[f]}}));}
  async function save(){
    setSaving(true);setErr('');
    try{
      await api.put(`/api/admin/users/${user.id}/permissions`,{
        permissions:cabinets.map(c=>({cabinet_id:c.id,can_view_orders:!!(perms[c.id]?.orders),can_view_stock:!!(perms[c.id]?.stock),can_view_ads:!!(perms[c.id]?.ads),can_view_finances:!!(perms[c.id]?.finances)}))
      });
      onClose();
    }catch(e){setErr(e.message);}finally{setSaving(false);}
  }
  return(
    <Modal title={`Доступы: ${user.login}`} onClose={onClose}
      footer={<><button className="btn btn-g" onClick={onClose}>Отмена</button><button className="btn btn-p" onClick={save} disabled={saving}>{saving?'Сохранение...':'Сохранить'}</button></>}>
      {err&&<Alert type="e">{err}</Alert>}
      {loading?<Loader/>:cabinets.length===0
        ?<div className="empty"><div className="empty-t">Нет кабинетов</div></div>
        :cabinets.map(c=>(
          <div key={c.id} className="perm-cab">
            <div className="perm-cn">{c.name}</div>
            <div className="perm-cks">
              {[['orders','📦 Заказы'],['stock','🏭 Остатки'],['ads','📣 Реклама'],['finances','💰 Финансы']].map(([f,l])=>(
                <label key={f} className="perm-ck"><input type="checkbox" checked={!!(perms[c.id]?.[f])} onChange={()=>tog(c.id,f)}/>{l}</label>
              ))}
            </div>
          </div>
        ))
      }
    </Modal>
  );
}

/* ── App ── */
function App(){
  const [auth,setAuth]=useState(()=>{
    const t=localStorage.getItem('token');
    if(!t)return null;
    try{
      const p=JSON.parse(atob(t.split('.')[1]));
      if(p.exp*1000<Date.now()){localStorage.removeItem('token');return null;}
      return{token:t,is_admin:p.admin,login:p.sub};
    }catch{localStorage.removeItem('token');return null;}
  });
  const [page,setPage]=useState('dashboard');
  const [cab,setCab]=useState(null);
  function logout(){localStorage.removeItem('token');setAuth(null);}
  function nav(p){setPage(p);setCab(null);}
  if(!auth)return<LoginPage onLogin={d=>setAuth(d)}/>;
  const crumbs=
    page==='cabinet'&&cab?['WB Dashboard','Обзор',cab.name]:
    page==='cabs'?['WB Dashboard','Кабинеты WB']:
    page==='users'?['WB Dashboard','Пользователи']:
    ['WB Dashboard','Обзор'];
  return(
    <div className="app">
      <Sidebar page={page} nav={nav} isAdmin={auth.is_admin} user={auth} onLogout={logout} cabName={page==='cabinet'?cab?.name:null}/>
      <div className="main">
        <Topbar crumbs={crumbs} isAdmin={auth.is_admin}/>
        <div className="page">
          {page==='cabinet'&&cab
            ?<CabinetDetail cabinet={cab} onBack={()=>{setCab(null);setPage('dashboard');}}/>
            :page==='cabs'?<AdminCabinets/>
            :page==='users'?<AdminUsers/>
            :<Dashboard onOpen={c=>{setCab(c);setPage('cabinet');}}/>
          }
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
