<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WB Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #08090d;
      --surface: #0f1117;
      --surface2: #161820;
      --surface3: #1e2130;
      --border: rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.10);
      --accent: #6366f1;
      --accent2: #818cf8;
      --accent-glow: rgba(99,102,241,0.20);
      --accent-glow2: rgba(99,102,241,0.08);
      --text: #f1f2f6;
      --text2: #9095a8;
      --text3: #555a6e;
      --success: #22d3a0;
      --success-bg: rgba(34,211,160,0.10);
      --warning: #f59e0b;
      --warning-bg: rgba(245,158,11,0.10);
      --danger: #f43f5e;
      --danger-bg: rgba(244,63,94,0.10);
      --grey-bg: rgba(148,163,184,0.08);
      --radius: 10px;
      --radius-sm: 6px;
      --sidebar-w: 228px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
    a{color:inherit;text-decoration:none}
    button{font-family:inherit;cursor:pointer}
    input,textarea{font-family:inherit}

    /* ── Scrollbar ── */
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}

    /* ── Layout ── */
    .layout{display:flex;min-height:100vh}
    .main{flex:1;margin-left:var(--sidebar-w);padding:28px 32px;min-height:100vh;max-width:1400px}

    /* ── Sidebar ── */
    .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100}
    .sidebar-brand{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
    .brand-logo{display:flex;align-items:center;gap:10px}
    .brand-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),#a855f7);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .brand-name{font-weight:700;font-size:15px;color:var(--text)}
    .brand-tag{font-size:11px;color:var(--text3);margin-top:1px}
    .sidebar-section{padding:12px 12px 4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3)}
    .sidebar-nav{flex:1;padding:8px;overflow-y:auto}
    .nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);color:var(--text2);font-size:13.5px;font-weight:500;cursor:pointer;transition:all .15s;margin-bottom:1px;border:1px solid transparent}
    .nav-item:hover{background:var(--surface2);color:var(--text)}
    .nav-item.active{background:var(--accent-glow2);color:var(--accent2);border-color:rgba(99,102,241,0.15)}
    .nav-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    .nav-badge{margin-left:auto;background:var(--accent-glow);color:var(--accent2);font-size:10px;font-weight:600;padding:1px 6px;border-radius:20px}
    .sidebar-footer{padding:12px;border-top:1px solid var(--border)}
    .user-card{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);background:var(--surface2)}
    .user-avatar{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),#a855f7);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .user-info{flex:1;min-width:0}
    .user-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .user-role{font-size:11px;color:var(--text3)}
    .logout-btn{background:none;border:none;color:var(--text3);padding:4px;border-radius:4px;display:flex;align-items:center;transition:color .15s}
    .logout-btn:hover{color:var(--danger)}

    /* ── Page header ── */
    .page-header{margin-bottom:24px}
    .page-title{font-size:20px;font-weight:700;color:var(--text)}
    .page-sub{font-size:13px;color:var(--text3);margin-top:3px}
    .page-actions{display:flex;gap:8px;margin-top:16px}

    /* ── Buttons ── */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;border:1px solid transparent;transition:all .15s;white-space:nowrap}
    .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
    .btn-primary:hover{background:#5254cc;border-color:#5254cc;box-shadow:0 0 12px var(--accent-glow)}
    .btn-ghost{background:transparent;color:var(--text2);border-color:var(--border2)}
    .btn-ghost:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
    .btn-danger{background:var(--danger-bg);color:var(--danger);border-color:rgba(244,63,94,0.2)}
    .btn-danger:hover{background:rgba(244,63,94,0.2)}
    .btn-sm{padding:5px 10px;font-size:12px}
    .btn-icon{padding:6px;border-radius:var(--radius-sm);background:transparent;border:1px solid var(--border);color:var(--text2);transition:all .15s}
    .btn-icon:hover{background:var(--surface2);color:var(--text)}

    /* ── KPI Cards ── */
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px}
    .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;transition:border-color .2s}
    .kpi-card:hover{border-color:var(--border2)}
    .kpi-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;gap:6px}
    .kpi-value{font-size:26px;font-weight:700;color:var(--text);line-height:1.1}
    .kpi-delta{font-size:12px;margin-top:4px;display:flex;align-items:center;gap:4px}
    .delta-up{color:var(--success)}
    .delta-down{color:var(--danger)}
    .delta-flat{color:var(--text3)}

    /* ── Cabinet cards ── */
    .cabinet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
    .cabinet-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
    .cabinet-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--accent-glow2),transparent);opacity:0;transition:opacity .2s}
    .cabinet-card:hover{border-color:rgba(99,102,241,0.3);transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
    .cabinet-card:hover::before{opacity:1}
    .cabinet-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
    .cabinet-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#a855f7);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
    .cabinet-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
    .cabinet-date{font-size:11px;color:var(--text3)}
    .cabinet-perms{display:flex;gap:4px;flex-wrap:wrap}
    .perm-tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;background:var(--accent-glow2);color:var(--accent2);border:1px solid rgba(99,102,241,0.15)}

    /* ── Table ── */
    .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .table-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
    .table-title{font-size:14px;font-weight:600;color:var(--text)}
    .table-meta{font-size:12px;color:var(--text3)}
    table{width:100%;border-collapse:collapse}
    thead th{background:var(--surface2);padding:10px 14px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);white-space:nowrap;border-bottom:1px solid var(--border)}
    tbody td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--border);color:var(--text2)}
    tbody tr:last-child td{border-bottom:none}
    tbody tr:hover td{background:var(--surface2);color:var(--text)}

    /* ── Tabs ── */
    .tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px}
    .tab{padding:9px 16px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
    .tab:hover{color:var(--text2)}
    .tab.active{color:var(--accent2);border-bottom-color:var(--accent)}

    /* ── Badges / Status ── */
    .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
    .badge-green{background:var(--success-bg);color:var(--success)}
    .badge-red{background:var(--danger-bg);color:var(--danger)}
    .badge-yellow{background:var(--warning-bg);color:var(--warning)}
    .badge-grey{background:var(--grey-bg);color:var(--text3)}
    .badge-purple{background:var(--accent-glow2);color:var(--accent2)}
    .dot{width:5px;height:5px;border-radius:50%;background:currentColor}

    /* ── Date filter bar ── */
    .filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
    .filter-label{font-size:12px;color:var(--text3);font-weight:500}
    .date-input{background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:6px 10px;border-radius:var(--radius-sm);font-size:12px;font-family:inherit;outline:none;transition:border-color .15s}
    .date-input:focus{border-color:var(--accent)}
    .date-input::-webkit-calendar-picker-indicator{filter:invert(.5)}

    /* ── Forms ── */
    .form-group{margin-bottom:14px}
    .form-label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px}
    .form-input{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:8px 12px;border-radius:var(--radius-sm);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
    .form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow2)}
    .form-input::placeholder{color:var(--text3)}
    .form-hint{font-size:11px;color:var(--text3);margin-top:5px}
    .form-error{font-size:11px;color:var(--danger);margin-top:5px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .toggle-wrap{display:flex;align-items:center;gap:8px;padding:6px 0}
    .toggle-wrap input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent);cursor:pointer}
    .toggle-label{font-size:13px;color:var(--text2)}

    /* ── Panel / Modal ── */
    .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
    .panel-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px}
    .panel-hint{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:var(--text3);margin-bottom:14px;line-height:1.6}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:24px;width:100%;max-width:440px;box-shadow:0 24px 64px rgba(0,0,0,.6)}
    .modal-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:16px}
    .modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

    /* ── Login page ── */
    .login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
    .login-bg{position:fixed;inset:0;overflow:hidden;pointer-events:none}
    .login-blob{position:absolute;border-radius:50%;filter:blur(120px);opacity:.12}
    .login-blob1{width:600px;height:600px;background:#6366f1;top:-200px;right:-100px}
    .login-blob2{width:400px;height:400px;background:#a855f7;bottom:-100px;left:-100px}
    .login-card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:36px;width:100%;max-width:380px;position:relative;box-shadow:0 32px 80px rgba(0,0,0,.5)}
    .login-logo{display:flex;align-items:center;justify-content:center;margin-bottom:28px}
    .login-logo-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--accent),#a855f7);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 8px 24px var(--accent-glow)}
    .login-title{text-align:center;font-size:20px;font-weight:700;margin-bottom:4px}
    .login-sub{text-align:center;font-size:13px;color:var(--text3);margin-bottom:24px}
    .login-btn{width:100%;padding:10px;background:linear-gradient(135deg,var(--accent),#a855f7);border:none;color:#fff;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px var(--accent-glow)}
    .login-btn:hover{opacity:.9;box-shadow:0 6px 20px var(--accent-glow)}
    .login-btn:disabled{opacity:.5;cursor:not-allowed}

    /* ── Alert / Error ── */
    .alert{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px}
    .alert-error{background:var(--danger-bg);color:var(--danger);border:1px solid rgba(244,63,94,.2)}
    .alert-success{background:var(--success-bg);color:var(--success);border:1px solid rgba(34,211,160,.2)}
    .alert-info{background:var(--accent-glow2);color:var(--accent2);border:1px solid rgba(99,102,241,.2)}

    /* ── Empty state ── */
    .empty{text-align:center;padding:48px 24px;color:var(--text3)}
    .empty-icon{font-size:36px;margin-bottom:12px}
    .empty-text{font-size:14px;font-weight:500;color:var(--text2);margin-bottom:4px}
    .empty-sub{font-size:13px}

    /* ── Loader ── */
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
    .loader{display:flex;align-items:center;justify-content:center;padding:48px;color:var(--text3);gap:12px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Divider ── */
    .divider{height:1px;background:var(--border);margin:16px 0}

    /* ── Utility ── */
    .flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-4{margin-top:16px}.mb-4{margin-bottom:16px}.text-sm{font-size:12px}.text-muted{color:var(--text3)}.text-accent{color:var(--accent2)}.font-bold{font-weight:700}.font-medium{font-weight:500}.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .num{font-variant-numeric:tabular-nums}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useCallback, useRef} = React;

// ── API ──────────────────────────────────────────────────────────────────────
const api = {
  token: () => localStorage.getItem('token'),
  headers: () => ({'Content-Type':'application/json', 'Authorization': `Bearer ${api.token()}`}),
  async req(method, path, body) {
    const r = await fetch(path, {method, headers: api.headers(), body: body ? JSON.stringify(body) : undefined});
    if (r.status === 204) return null;
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data.detail || `HTTP ${r.status}`);
    return data;
  },
  get: (path) => api.req('GET', path),
  post: (path, body) => api.req('POST', path, body),
  put: (path, body) => api.req('PUT', path, body),
  patch: (path, body) => api.req('PATCH', path, body),
  del: (path) => api.req('DELETE', path),
};

// ── Helpers ──────────────────────────────────────────────────────────────────
const fmt = {
  num: (n) => n == null ? '—' : Number(n).toLocaleString('ru-RU'),
  rub: (n) => n == null ? '—' : Number(n).toLocaleString('ru-RU', {style:'currency', currency:'RUB', maximumFractionDigits:0}),
  date: (s) => s ? s.slice(0,10) : '—',
};

function useAsync(fn, deps=[]) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  useEffect(() => {
    let alive = true;
    setLoading(true); setError(null);
    fn().then(d => { if(alive){setData(d);setLoading(false);} })
        .catch(e => { if(alive){setError(e.message);setLoading(false);} });
    return () => { alive = false; };
  }, deps);
  return {data, loading, error, reload: () => {}};
}

// ── Components ───────────────────────────────────────────────────────────────

function Loader() {
  return <div className="loader"><div className="spinner"/><span>Загрузка...</span></div>;
}

function Alert({type='error', children}) {
  const icons = {error:'⚠', success:'✓', info:'ℹ'};
  return <div className={`alert alert-${type}`}><span>{icons[type]}</span><span>{children}</span></div>;
}

function Modal({title, onClose, children, footer}) {
  return (
    <div className="overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <div className="flex items-center justify-between mb-4">
          <div className="modal-title" style={{margin:0}}>{title}</div>
          <button className="btn-icon" onClick={onClose} style={{border:'none',fontSize:16}}>✕</button>
        </div>
        {children}
        {footer && <div className="modal-footer">{footer}</div>}
      </div>
    </div>
  );
}

// ── Login ────────────────────────────────────────────────────────────────────
function LoginPage({onLogin}) {
  const [login, setLogin] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  async function submit(e) {
    e.preventDefault();
    setLoading(true); setError('');
    try {
      const data = await api.post('/api/auth/login', {login, password});
      localStorage.setItem('token', data.token);
      onLogin(data);
    } catch(e) {
      setError(e.message);
    } finally { setLoading(false); }
  }

  return (
    <div className="login-page">
      <div className="login-bg">
        <div className="login-blob login-blob1"/>
        <div className="login-blob login-blob2"/>
      </div>
      <div className="login-card">
        <div className="login-logo">
          <div className="login-logo-icon">🛒</div>
        </div>
        <div className="login-title">WB Dashboard</div>
        <div className="login-sub">Аналитика Wildberries в реальном времени</div>
        {error && <Alert type="error">{error}</Alert>}
        <form onSubmit={submit}>
          <div className="form-group">
            <label className="form-label">Логин</label>
            <input className="form-input" value={login} onChange={e=>setLogin(e.target.value)} placeholder="Введите логин" autoFocus required/>
          </div>
          <div className="form-group" style={{marginBottom:20}}>
            <label className="form-label">Пароль</label>
            <input className="form-input" type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="Введите пароль" required/>
          </div>
          <button className="login-btn" type="submit" disabled={loading}>
            {loading ? <><span className="spinner" style={{borderTopColor:'#fff',borderColor:'rgba(255,255,255,.3)'}}/> Вход...</> : 'Войти'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ── Sidebar ──────────────────────────────────────────────────────────────────
function Sidebar({page, setPage, isAdmin, user, onLogout}) {
  const navMain = [
    {id:'dashboard', icon:'⬡', label:'Дашборд'},
  ];
  const navAdmin = [
    {id:'admin-cabinets', icon:'🗄', label:'Кабинеты'},
    {id:'admin-users', icon:'👥', label:'Пользователи'},
  ];

  return (
    <aside className="sidebar">
      <div className="sidebar-brand">
        <div className="brand-logo">
          <div className="brand-icon">🛒</div>
          <div>
            <div className="brand-name">WB Dashboard</div>
            <div className="brand-tag">Wildberries Analytics</div>
          </div>
        </div>
      </div>
      <nav className="sidebar-nav">
        <div className="sidebar-section">Навигация</div>
        {navMain.map(n => (
          <div key={n.id} className={`nav-item${page===n.id||page.startsWith('cabinet')&&n.id==='dashboard'?' active':''}`} onClick={()=>setPage(n.id)}>
            <span className="nav-icon">{n.icon}</span>{n.label}
          </div>
        ))}
        {isAdmin && <>
          <div className="sidebar-section" style={{marginTop:8}}>Администрирование</div>
          {navAdmin.map(n => (

// ── Cabinet Detail ────────────────────────────────────────────────────────────
function CabinetDetail({cabinet, onBack}) {
  const perms = cabinet.permissions || {};
  const tabs = [
    perms.orders && {id:'orders', label:'📦 Заказы'},
    perms.stock  && {id:'stock',  label:'🏭 Остатки'},
    perms.ads    && {id:'ads',    label:'📣 Реклама'},
    perms.finances && {id:'finances', label:'💰 Финансы'},
  ].filter(Boolean);

  const [tab, setTab] = useState(tabs[0]?.id || '');
  const today = new Date().toISOString().slice(0,10);
  const week  = new Date(Date.now()-7*864e5).toISOString().slice(0,10);
  const [dateFrom, setDateFrom] = useState(week);
  const [dateTo, setDateTo] = useState(today);

  return (
    <div>
      <div className="page-header">
        <div className="flex items-center gap-2">
          <button className="btn btn-ghost btn-sm" onClick={onBack}>← Назад</button>
          <div className="page-title">{cabinet.name}</div>
        </div>
        <div className="page-sub">Детальная аналитика кабинета</div>
      </div>

      <div className="tabs">
        {tabs.map(t => <div key={t.id} className={`tab${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>{t.label}</div>)}
      </div>

      {(tab==='orders'||tab==='ads'||tab==='finances') && (
        <div className="filter-bar">
          <span className="filter-label">Период:</span>
          <input type="date" className="date-input" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}/>
          <span className="text-muted">—</span>
          <input type="date" className="date-input" value={dateTo} onChange={e=>setDateTo(e.target.value)}/>
        </div>
      )}

      {tab==='orders'   && <OrdersTab cabinetId={cabinet.id} dateFrom={dateFrom} dateTo={dateTo}/>}
      {tab==='stock'    && <StockTab cabinetId={cabinet.id}/>}
      {tab==='ads'      && <AdsTab cabinetId={cabinet.id} dateFrom={dateFrom} dateTo={dateTo}/>}
      {tab==='finances' && <FinancesTab cabinetId={cabinet.id} dateFrom={dateFrom} dateTo={dateTo}/>}
    </div>
  );
}

function OrdersTab({cabinetId, dateFrom, dateTo}) {

  const [error, setError] = useState('');

function StatusBadge({status}) {
  if (!status) return <span className="badge badge-grey">—</span>;
  const s = status.toLowerCase();
  if (s.includes('cancel')) return <span className="badge badge-red"><span className="dot"/>Отмена</span>;
  if (s.includes('deliver')||s.includes('доставл')) return <span className="badge badge-green"><span className="dot"/>Доставлен</span>;
  if (s.includes('new')||s.includes('создан')) return <span className="badge badge-purple"><span className="dot"/>Новый</span>;
  return <span className="badge badge-grey">{status}</span>;
}

function StockTab({cabinetId}) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');

  const filtered = (data||[]).filter(r => filter==='all' || r.alert===filter);

  (data||[]).forEach(r => { if(counts[r.alert]!=null) counts[r.alert]++; });

  return (
    <div>
      <div className="kpi-grid" style={{gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))'}}>

          <button key={v} className={`btn btn-sm${filter===v?' btn-primary':' btn-ghost'}`} onClick={()=>setFilter(v)}>{l}</button>

        <div className="table-header">
          <span className="table-title">Остатки</span>
          <span className="table-meta">{filtered.length} позиций</span>

function AlertBadge({alert}) {

  if (alert==='green')  return <span className="badge badge-green"><span className="dot"/>Норма</span>;

// ── Admin Cabinets ────────────────────────────────────────────────────────────
function AdminCabinets() {
  const [cabinets, setCabinets] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [name, setName] = useState('');
  const [token, setToken] = useState('');
  const [err, setErr] = useState('');
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    api.get('/api/admin/cabinets').then(setCabinets).finally(()=>setLoading(false));
  }, []);

  async function add(e) {
    e.preventDefault(); setErr(''); setSaving(true);
    try {
      const c = await api.post('/api/admin/cabinets', {name, api_token: token});
      setCabinets(p=>[...p, c]);
      setName(''); setToken(''); setShowForm(false);
    } catch(e) { setErr(e.message); }
    finally { setSaving(false); }
  }

  async function del(id) {
    if (!confirm('Удалить кабинет?')) return;
    await api.del(`/api/admin/cabinets/${id}`);
    setCabinets(p=>p.filter(c=>c.id!==id));
  }

  if (loading) return <Loader/>;

  return (
    <div>
      <div className="page-header">
        <div className="flex items-center justify-between">
          <div><div className="page-title">Кабинеты WB</div><div className="page-sub">Управление кабинетами и API токенами</div></div>
          <button className="btn btn-primary" onClick={()=>setShowForm(true)}>+ Добавить кабинет</button>
        </div>
      </div>

      {showForm && (
        <div className="panel" style={{maxWidth:480,marginBottom:20}}>
          <div className="panel-title">🗄 Новый кабинет</div>
          <div className="panel-hint">Токен проверяется при добавлении. Убедитесь что у токена есть доступ к нужным разделам WB API.</div>
          {err && <Alert type="error">{err}</Alert>}
          <form onSubmit={add}>
            <div className="form-group">
              <label className="form-label">Название кабинета</label>
              <input className="form-input" value={name} onChange={e=>setName(e.target.value)} placeholder="Мой магазин" required/>
            </div>
            <div className="form-group">
              <label className="form-label">API токен WB</label>
              <input className="form-input" value={token} onChange={e=>setToken(e.target.value)} placeholder="eyJhbGci..." required/>
            </div>
            <div className="flex gap-2">
              <button className="btn btn-primary" type="submit" disabled={saving}>{saving?'Добавление...':'Добавить'}</button>
              <button className="btn btn-ghost" type="button" onClick={()=>{setShowForm(false);setErr('');}}>Отмена</button>
            </div>
          </form>
        </div>
      )}

      {cabinets.length===0
        ? <div className="empty"><div className="empty-icon">🗄</div><div className="empty-text">Кабинеты не добавлены</div></div>
        : <div className="table-wrap">
            <table>
              <thead><tr><th>#</th><th>Название</th><th>Добавлен</th><th></th></tr></thead>
              <tbody>
                {cabinets.map(c=>(
                  <tr key={c.id}>
                    <td className="text-muted">{c.id}</td>
                    <td className="font-bold">{c.name}</td>
                    <td className="text-muted">{fmt.date(c.created_at)}</td>
                    <td><button className="btn btn-danger btn-sm" onClick={()=>del(c.id)}>Удалить</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
      }
    </div>
  );
}

// ── Admin Users ───────────────────────────────────────────────────────────────
function AdminUsers() {
  const [users, setUsers] = useState([]);
  const [cabinets, setCabinets] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showCreate, setShowCreate] = useState(false);
  const [permUser, setPermUser] = useState(null);
  const [login, setLogin] = useState('');
  const [password, setPassword] = useState('');
  const [isAdmin, setIsAdmin] = useState(false);
  const [err, setErr] = useState('');
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    Promise.all([api.get('/api/admin/users'), api.get('/api/admin/cabinets')])
      .then(([u,c])=>{setUsers(u);setCabinets(c);})
      .finally(()=>setLoading(false));
  }, []);

  async function create(e) {
    e.preventDefault(); setErr(''); setSaving(true);
    try {
      const u = await api.post('/api/admin/users', {login, password, is_admin: isAdmin});
      setUsers(p=>[...p, u]);
      setLogin(''); setPassword(''); setIsAdmin(false); setShowCreate(false);
    } catch(e){setErr(e.message);}
    finally{setSaving(false);}
  }

  async function toggle(id) {
    const u = await api.patch(`/api/admin/users/${id}/active`);
    setUsers(p=>p.map(x=>x.id===id?{...x,...u}:x));
  }

  async function del(id) {
    if (!confirm('Удалить пользователя?')) return;
    await api.del(`/api/admin/users/${id}`);
    setUsers(p=>p.filter(u=>u.id!==id));
  }

  if (loading) return <Loader/>;

  return (
    <div>
      <div className="page-header">
        <div className="flex items-center justify-between">
          <div><div className="page-title">Пользователи</div><div className="page-sub">Управление доступом к кабинетам</div></div>
          <button className="btn btn-primary" onClick={()=>setShowCreate(true)}>+ Добавить пользователя</button>
        </div>
      </div>

      {showCreate && (
        <Modal title="Новый пользователь" onClose={()=>{setShowCreate(false);setErr('');}}>
          {err && <Alert type="error">{err}</Alert>}
          <form onSubmit={create}>
            <div className="form-group">
              <label className="form-label">Логин</label>
              <input className="form-input" value={login} onChange={e=>setLogin(e.target.value)} placeholder="user123" required/>
            </div>
            <div className="form-group">
              <label className="form-label">Пароль (мин. 8 символов)</label>
              <input className="form-input" type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" required/>
            </div>
            <div className="toggle-wrap">
              <input type="checkbox" id="isAdmin" checked={isAdmin} onChange={e=>setIsAdmin(e.target.checked)}/>
              <label htmlFor="isAdmin" className="toggle-label">Администратор</label>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" type="button" onClick={()=>{setShowCreate(false);setErr('');}}>Отмена</button>
              <button className="btn btn-primary" type="submit" disabled={saving}>{saving?'Создание...':'Создать'}</button>
            </div>
          </form>
        </Modal>
      )}

      {permUser && <PermissionsModal user={permUser} cabinets={cabinets} onClose={()=>setPermUser(null)}/>}

      <div className="table-wrap">
        <table>
          <thead><tr><th>#</th><th>Логин</th><th>Роль</th><th>Статус</th><th>Создан</th><th>Действия</th></tr></thead>
          <tbody>
            {users.map(u=>(
              <tr key={u.id}>
                <td className="text-muted">{u.id}</td>
                <td className="font-bold">{u.login}</td>
                <td>{u.is_admin ? <span className="badge badge-purple">Админ</span> : <span className="badge badge-grey">Просмотр</span>}</td>
                <td>{u.is_active ? <span className="badge badge-green"><span className="dot"/>Активен</span> : <span className="badge badge-red"><span className="dot"/>Отключён</span>}</td>
                <td className="text-muted">{fmt.date(u.created_at)}</td>
                <td>
                  <div className="flex gap-2">
                    <button className="btn btn-ghost btn-sm" onClick={()=>setPermUser(u)}>Доступы</button>
                    <button className="btn btn-ghost btn-sm" onClick={()=>toggle(u.id)}>{u.is_active?'Отключить':'Включить'}</button>
                    <button className="btn btn-danger btn-sm" onClick={()=>del(u.id)}>✕</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function PermissionsModal({user, cabinets, onClose}) {
  const [perms, setPerms] = useState({});
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState('');

  useEffect(() => {
    api.get(`/api/admin/users/${user.id}/permissions`).then(data => {
      const map = {};
      data.forEach(p => { map[p.cabinet_id] = {orders:!!p.can_view_orders, stock:!!p.can_view_stock, ads:!!p.can_view_ads, finances:!!p.can_view_finances}; });
      setPerms(map);
    }).finally(()=>setLoading(false));
  }, [user.id]);

  function toggle(cabId, field) {
    setPerms(p => ({...p, [cabId]: {...(p[cabId]||{}), [field]: !(p[cabId]?.[field])}}));
  }

  async function save() {
    setSaving(true); setErr('');
    try {
      const permissions = cabinets.map(c => ({
        cabinet_id: c.id,
        can_view_orders: !!(perms[c.id]?.orders),
        can_view_stock: !!(perms[c.id]?.stock),
        can_view_ads: !!(perms[c.id]?.ads),
        can_view_finances: !!(perms[c.id]?.finances),
      }));
      await api.put(`/api/admin/users/${user.id}/permissions`, {permissions});
      onClose();
    } catch(e){setErr(e.message);}
    finally{setSaving(false);}
  }

  return (
    <Modal title={`Доступы: ${user.login}`} onClose={onClose}
      footer={<><button className="btn btn-ghost" onClick={onClose}>Отмена</button><button className="btn btn-primary" onClick={save} disabled={saving}>{saving?'Сохранение...':'Сохранить'}</button></>}>
      {err && <Alert type="error">{err}</Alert>}
      {loading ? <Loader/> : cabinets.length===0 ? <div className="empty"><div className="empty-text">Нет кабинетов</div></div> :
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {cabinets.map(c => (
            <div key={c.id} style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',padding:'12px 14px'}}>
              <div style={{fontWeight:600,marginBottom:10,color:'var(--text)'}}>{c.name}</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                {[['orders','📦 Заказы'],['stock','🏭 Остатки'],['ads','📣 Реклама'],['finances','💰 Финансы']].map(([f,l])=>(
                  <label key={f} style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:13,color:'var(--text2)'}}>
                    <input type="checkbox" style={{accentColor:'var(--accent)'}} checked={!!(perms[c.id]?.[f])} onChange={()=>toggle(c.id,f)}/>
                    {l}
                  </label>
                ))}
              </div>
            </div>
          ))}
        </div>
      }
    </Modal>
  );
}

// ── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [auth, setAuth] = useState(() => {
    const t = localStorage.getItem('token');
    if (!t) return null;
    try {
      const p = JSON.parse(atob(t.split('.')[1]));
      if (p.exp * 1000 < Date.now()) { localStorage.removeItem('token'); return null; }
      return {token: t, is_admin: p.admin, login: p.sub};
    } catch { localStorage.removeItem('token'); return null; }
  });
  const [page, setPage] = useState('dashboard');
  const [activeCabinet, setActiveCabinet] = useState(null);

  function logout() { localStorage.removeItem('token'); setAuth(null); }

  if (!auth) return <LoginPage onLogin={d=>setAuth(d)}/>;

  function openCabinet(c) { setActiveCabinet(c); setPage('cabinet'); }
  function backToDashboard() { setActiveCabinet(null); setPage('dashboard'); }

  let content;
  if (page==='cabinet' && activeCabinet) content = <CabinetDetail cabinet={activeCabinet} onBack={backToDashboard}/>;
  else if (page==='admin-cabinets') content = <AdminCabinets/>;
  else if (page==='admin-users') content = <AdminUsers/>;
  else content = <Dashboard onOpenCabinet={openCabinet}/>;

  return (
    <div className="layout">
      <Sidebar page={page} setPage={p=>{setPage(p);setActiveCabinet(null);}} isAdmin={auth.is_admin} user={auth} onLogout={logout}/>
      <main className="main">{content}</main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
